[pytest]
testpaths = tests
addopts = -ra
markers =
    slow: marks tests as slow (deselect with '-m \"not slow\"')
    integration: marks integration-style tests (deselect with '-m \"not integration\"')
    full: marks heavy full-suite tests that are skipped by default (run with '--run-full' or SWARM_RUN_FULL=1)
    e2e: marks end-to-end tests that require external runtime dependencies (run with '--run-e2e' or SWARM_RUN_E2E=1)
